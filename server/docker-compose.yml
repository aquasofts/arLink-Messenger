services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: nearlink
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: nearlink
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nearlink"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build: .
    image: nearlink/nearlink-server:dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      TZ: UTC
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - serverdata:/var/lib/nearlink
    expose:
      - "8080"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      NEARLINK_DOMAIN: ${NEARLINK_DOMAIN:?set NEARLINK_DOMAIN in .env}
      NEARLINK_ACME_EMAIL: ${NEARLINK_ACME_EMAIL:-admin@example.com}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - server

volumes:
  pgdata:
  serverdata:
  caddy_data:
  caddy_config:
